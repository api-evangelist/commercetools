      properties:
        limit:
          type: integer
        offset:
          type: integer
        count:
          type: integer
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/InventoryEntry'
    Subscription:
      type: object
      description: A subscription routing change notifications and messages to an external message queue destination.
      required:
        - id
        - version
        - destination
      properties:
        id:
          type: string
          description: System-generated unique identifier.
        version:
          type: integer
          description: Current version for optimistic concurrency control.
        key:
          type: string
          description: User-defined unique identifier (2-256 characters).
        destination:
          type: object
          description: The external message queue destination configuration.
        messages:
          type: array
          items:
            type: object
          description: Message type subscriptions filtering which message types to deliver.
        changes:
          type: array
          items:
            type: object
          description: Change subscriptions filtering which resource change events to deliver.
        format:
          type: object
          description: Delivery format configuration (Platform or CloudEvents).
        status:
          type: string
          enum: [Healthy, ConfigurationError, ConfigurationErrorDeliveryStopped, TemporaryError]
          description: Current health status of the subscription.
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the subscription was created.
        lastModifiedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the subscription was last modified.
    SubscriptionDraft:
      type: object
      description: Request body for creating a new subscription.
      required:
        - destination
      properties:
        key:
          type: string
          description: User-defined unique key (2-256 characters).
        destination:
          type: object
          description: The message queue destination configuration.
        messages:
          type: array
          items:
            type: object
          description: Message type filters for this subscription.
        changes:
          type: array
          items:
            type: object
          description: Change type filters for this subscription.
        format:
          type: object
          description: Delivery format configuration.
    SubscriptionUpdate:
      type: object
      description: Request body for updating a subscription.
      required:
        - version
        - actions
      properties:
        version:
          type: integer
          description: Current version for optimistic concurrency control.
        actions:
          type: array
          items:
            type: object
          description: List of update actions to apply to the subscription.
    SubscriptionPagedQueryResponse:
      type: object
      description: Paginated response containing a list of subscriptions.
      required:
        - limit
        - offset
        - count
        - total
        - results
      properties:
        limit:
          type: integer
        offset:
          type: integer
        count:
          type: integer
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
    Project:
      type: object
      description: The project resource containing global configuration for languages, currencies, countries, and features.
      required:
        - key
        - name
        - currencies
        - languages
        - countries
      properties:
        key:
          type: string
          description: The unique project key.
        name:
          type: string
          description: Human-readable name of the project.
        currencies:
          type: array
          items:
            type: string
            pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency codes enabled for the project.
        languages:
          type: array
          items:
            type: string
          description: IETF language tags enabled for the project.
        countries:
          type: array
          items:
            type: string
          description: ISO 3166-1 alpha-2 country codes enabled for the project.
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the project was created.
  responses:
    BadRequest:
      description: The request was malformed or contained invalid parameters.
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
              message:
                type: string
              errors:
                type: array
                items:
                  type: object
    Unauthorized:
      description: The request lacked valid authentication credentials.
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
              message:
                type: string
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
              message:
                type: string
    Conflict:
      description: >-
        A version conflict occurred. The provided version does not match the
        current version of the resource.
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
              message:
                type: string
