specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: commercetools
providerId: commercetools
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Commerce
description: commercetools API rate limits per project.
sources:
  - https://commercetools.com/pricing
  - https://docs.commercetools.com/api/limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  concurrentModification: 409
limits:
  - name: REST API requests
    scope: project
    metric: requests_per_second
    limit: 200
    timeFrame: second
  - name: Search requests (Product Projection)
    scope: project
    metric: requests_per_second
    limit: 100
    timeFrame: second
  - name: Concurrent connections
    scope: project
    metric: concurrent
    limit: 200
  - name: Maximum response size
    scope: request
    metric: MB
    limit: 16
    timeFrame: request
