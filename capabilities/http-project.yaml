naftiko: 1.0.0-alpha2
info:
  label: commercetools HTTP API — Project
  description: 'commercetools HTTP API — Project. 1 operations. Lead operation: Get project settings. Self-contained Naftiko
    capability covering one Commercetools business surface.'
  tags:
  - Commercetools
  - Project
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMERCETOOLS_API_KEY: COMMERCETOOLS_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-project
    baseUri: https://api.{region}.commercetools.com
    description: commercetools HTTP API — Project business capability. Self-contained, no shared references.
    resources:
    - name: projectKey
      path: /{projectKey}
      operations:
      - name: getproject
        method: GET
        description: Get project settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.COMMERCETOOLS_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-project-rest
    port: 8080
    description: REST adapter for commercetools HTTP API — Project. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{projectkey}
      name: projectkey
      description: REST surface for projectKey.
      operations:
      - method: GET
        name: getproject
        description: Get project settings
        call: http-project.getproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-project-mcp
    port: 9090
    transport: http
    description: MCP adapter for commercetools HTTP API — Project. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-project-settings
      description: Get project settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-project.getproject
      outputParameters:
      - type: object
        mapping: $.
