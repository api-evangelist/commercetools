naftiko: 1.0.0-alpha2
info:
  label: commercetools Import API — Inventory
  description: 'commercetools Import API — Inventory. 1 operations. Lead operation: Import inventory entries. Self-contained
    Naftiko capability covering one Commercetools business surface.'
  tags:
  - Commercetools
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMERCETOOLS_API_KEY: COMMERCETOOLS_API_KEY
capability:
  consumes:
  - type: http
    namespace: import-inventory
    baseUri: https://import.{region}.commercetools.com
    description: commercetools Import API — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: projectKey-inventories-import-containers-importContainerKey
      path: /{projectKey}/inventories/import-containers/{importContainerKey}
      operations:
      - name: importinventoryentries
        method: POST
        description: Import inventory entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COMMERCETOOLS_API_KEY}}'
  exposes:
  - type: rest
    namespace: import-inventory-rest
    port: 8080
    description: REST adapter for commercetools Import API — Inventory. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{projectkey}/inventories/import-containers/{importcontainerkey}
      name: projectkey-inventories-import-containers-importcontainerkey
      description: REST surface for projectKey-inventories-import-containers-importContainerKey.
      operations:
      - method: POST
        name: importinventoryentries
        description: Import inventory entries
        call: import-inventory.importinventoryentries
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: import-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for commercetools Import API — Inventory. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: import-inventory-entries
      description: Import inventory entries
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: import-inventory.importinventoryentries
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
