    resources:
    - name: projectKey-categories-import-containers-importContainerKey
      path: /{projectKey}/categories/import-containers/{importContainerKey}
      operations:
      - name: importcategories
        method: POST
        description: Import categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COMMERCETOOLS_API_KEY}}'
