      name: projectkey-categories-import-containers-importcontainerkey
      description: REST surface for projectKey-categories-import-containers-importContainerKey.
      operations:
      - method: POST
        name: importcategories
        description: Import categories
        call: import-categories.importcategories
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
